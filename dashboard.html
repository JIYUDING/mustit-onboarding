<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUST'IT 온보딩 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--red:#E8192C;--dark:#14141F;--dark2:#1E1E2E;--dark3:#252535;--gray:#8888A0;--border:rgba(255,255,255,0.08);--success:#22C55E;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:white;min-height:100vh;}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 28px;border-bottom:1px solid var(--border);background:rgba(20,20,31,0.95);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.logo{background:var(--red);color:white;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;padding:4px 9px;border-radius:5px;}
.topbar-title{font-size:14px;font-weight:700;}
.topbar-sub{font-size:11px;color:var(--gray);}
.refresh-btn{padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--gray);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.refresh-btn:hover{border-color:rgba(255,255,255,0.2);color:white;}
.add-btn{padding:8px 18px;background:var(--red);border:none;border-radius:8px;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-left:auto;}
.add-btn:hover{opacity:0.88;}
.wrap{max-width:900px;margin:0 auto;padding:32px 24px;}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px;}
.sum-box{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.sum-n{font-size:26px;font-weight:700;}
.sum-l{font-size:11px;color:var(--gray);margin-top:3px;letter-spacing:0.5px;}
.sum-box.highlight{border-color:rgba(232,25,44,0.3);}
.sum-box.highlight .sum-n{color:var(--red);}
.section-title{font-size:13px;font-weight:700;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.mission-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gray);}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.people-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:36px;}
.person-wrap{border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s;}
.person-wrap.complete{border-color:rgba(34,197,94,0.25);}
.person-card{background:var(--dark2);padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;}
.person-card:hover{background:rgba(30,30,46,0.8);}
.avatar{width:40px;height:40px;border-radius:12px;background:var(--dark3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.person-info{flex:1;min-width:0;}
.person-name{font-size:14px;font-weight:700;}
.person-meta{font-size:11px;color:var(--gray);margin-top:2px;}
.person-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.person-pct{font-size:20px;font-weight:700;}
.person-pct.done{color:var(--success);}
.person-pct.mid{color:#FBBF24;}
.person-pct.low{color:var(--gray);}
.mini-bar-wrap{width:120px;height:4px;background:rgba(255,255,255,0.08);border-radius:999px;overflow:hidden;}
.mini-bar{height:4px;border-radius:999px;transition:width .5s;}
.mini-bar.done-bar{background:var(--success);}
.mini-bar.mid-bar{background:#FBBF24;}
.mini-bar.low-bar{background:var(--gray);}
.mission-dots{display:flex;gap:4px;margin-top:4px;}
.mdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.1);}
.mdot.sent{background:var(--success);}
.mdot.partial{background:#FBBF24;}
.day-badge{font-size:10px;color:var(--red);border:1px solid rgba(232,25,44,0.3);padding:2px 7px;border-radius:999px;}
.expand-icon{font-size:10px;color:var(--gray);transition:transform .2s;margin-top:2px;}
.expand-icon.open{transform:rotate(180deg);}
.hr-panel{display:none;border-top:1px solid var(--border);background:rgba(0,0,0,0.25);padding:18px 20px;}
.hr-panel.open{display:block;}
.hr-panel-title{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.hr-task{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;}
.hr-task:last-of-type{border-bottom:none;}
.hr-cb{width:16px;height:16px;border-radius:4px;border:1.5px solid rgba(255,255,255,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;transition:all .15s;}
.hr-cb.on{background:var(--success);border-color:var(--success);color:white;}
.hr-label{flex:1;min-width:120px;}
.hr-input{flex:1;min-width:160px;padding:5px 10px;background:var(--dark3);border:1px solid var(--border);border-radius:6px;color:white;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.hr-input:focus{border-color:rgba(232,25,44,0.4);}
.notify-btn{padding:4px 10px;background:rgba(80,89,201,0.15);border:1px solid rgba(80,89,201,0.3);border-radius:6px;color:#8B96E9;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.notify-btn:hover{background:rgba(80,89,201,0.25);}
.notify-btn.sent{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.3);color:#86EFAC;cursor:default;}
.hr-footer{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.del-btn{padding:6px 14px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:var(--gray);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.del-btn:hover{border-color:rgba(232,25,44,0.5);color:#FF6B7A;}
.link-copy-btn{flex:1;padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--gray);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.link-copy-btn:hover{color:white;border-color:rgba(255,255,255,0.2);}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:20px;}
.mfield{margin-bottom:14px;}
.mfield label{display:block;font-size:11px;color:var(--gray);margin-bottom:5px;}
.mfield input,.mfield select{width:100%;padding:10px 12px;background:var(--dark3);border:1px solid var(--border);border-radius:8px;color:white;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.mfield input:focus,.mfield select:focus{border-color:rgba(232,25,44,0.5);}
.mfield select option{background:var(--dark2);}
.modal-btns{display:flex;gap:8px;margin-top:20px;}
.modal-cancel{flex:1;padding:10px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--gray);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.modal-submit{flex:2;padding:10px;background:var(--red);border:none;border-radius:8px;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.link-box{background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--gray);word-break:break-all;margin-top:12px;}
.copy-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--gray);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:6px;}
.copy-btn:hover{color:white;}
.empty{text-align:center;padding:60px 20px;color:var(--gray);}
.empty h3{font-size:16px;margin-bottom:8px;}
@media(max-width:600px){.summary{grid-template-columns:repeat(2,1fr);}.mini-bar-wrap{width:80px;}}
</style>
</head>

  {id:'m8',emoji:'🤖',title:'Claude AI'},

const MISSION_TASKS = {m0:3,m1:6,m2:2,m3:8,m4:7,m5:6,m6:3,m7:2,m8:7};

(function(){

    const input = prompt('People Team 전용 페이지입니다.\n비밀번호를 입력해주세요:');
    if(input !== 'mustitpeople'){
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Noto Sans KR,sans-serif;color:#888;font-size:14px;">접근 권한이 없습니다.</div>';
      throw new Error('Unauthorized');
    }
    localStorage.setItem('mustit_dashboard_auth','mustitpeople');
  }
})();

function getDayDiff(joindate){
  return Math.floor((new Date()-new Date(joindate))/(1000*60*60*24))+1;
}
function getHRState(userId){
  return JSON.parse(localStorage.getItem('mustit_hr_'+userId)||'{}');
}
function saveHRState(userId, state){
  localStorage.setItem('mustit_hr_'+userId, JSON.stringify(state));
}
function toggleHR(userId, key){
  const state = getHRState(userId);
  state[key] = !state[key];
  saveHRState(userId, state);
  const el = document.getElementById('hr_'+userId+'_'+key);
  if(el){ el.classList.toggle('on', state[key]); el.textContent = state[key]?'✓':''; }
}
function saveNote(userId, key){
  const el = document.getElementById('note_'+userId+'_'+key);
  if(!el) return;
  const state = getHRState(userId);
  state[key+'_val'] = el.value;
  saveHRState(userId, state);
}
function notifyIT(userId){
  const btn = document.getElementById('notify_'+userId);
  if(btn && btn.classList.contains('sent')) return;
  const emailEl = document.getElementById('note_'+userId+'_email');
  const email = emailEl ? emailEl.value : '';
  const allUsers = JSON.parse(localStorage.getItem('mustit_users')||'{}');
  const u = allUsers[userId];
  if(!u) return;
  fetch(WEBHOOK_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      type:'message',
      attachments:[{
        contentType:'application/vnd.microsoft.card.adaptive',
        content:{
          type:'AdaptiveCard',version:'1.2',
          body:[
            {type:'TextBlock',text:'🔐 사내 계정 생성 요청',weight:'Bolder',size:'Medium'},
            {type:'TextBlock',text:'@shkang@mustit.co.kr @jyshim@mustit.co.kr 계정 생성 요청드립니다.',wrap:true},
            {type:'FactSet',facts:[
              {title:'입사자',value:u.name+' ('+u.dept+')'},
              {title:'입사일',value:new Date(u.joindate).toLocaleDateString('ko-KR')},
              {title:'생성할 이메일',value:email||'미입력'},
              {title:'요청 시각',value:new Date().toLocaleString('ko-KR')}
            ]}
          ]
        }
      }]
    })
  }).catch(()=>{});
  if(btn){ btn.classList.add('sent'); btn.textContent='✓ 전송 완료'; }
  const state = getHRState(userId);
  state['it_account'] = true;
  state['notify_sent'] = true;
  saveHRState(userId, state);
  const cb = document.getElementById('hr_'+userId+'_it_account');
  if(cb){ cb.classList.add('on'); cb.textContent='✓'; }
}
function togglePanel(userId){
  const panel = document.getElementById('panel_'+userId);
  const icon = document.getElementById('icon_'+userId);
  if(!panel) return;
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.hr-panel').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('.expand-icon').forEach(i=>i.classList.remove('open'));
  if(!isOpen){ panel.classList.add('open'); icon.classList.add('open'); }
}
function copyUserLink(userId){
  const link = window.location.origin + window.location.pathname.replace('dashboard.html','') + 'onboarding.html?uid=' + encodeURIComponent(userId);
  navigator.clipboard.writeText(link).then(()=>alert('링크 복사됐어요! 입사자에게 전달해주세요 😊'));
}
function deleteUser(userId){
  if(!confirm('이 입사자를 삭제할까요?')) return;
  const allUsers = JSON.parse(localStorage.getItem('mustit_users')||'{}');
  delete allUsers[userId];
  localStorage.setItem('mustit_users', JSON.stringify(allUsers));
  loadDashboard();
}

function loadDashboard(){
  const allUsers = JSON.parse(localStorage.getItem('mustit_users')||'{}');
  const users = Object.values(allUsers);
  document.getElementById('s-total').textContent = users.length;
  document.getElementById('s-complete').textContent = users.filter(u=>u.pct===100).length;
  document.getElementById('s-inprogress').textContent = users.filter(u=>u.pct>0&&u.pct<100).length;
  const avg = users.length ? Math.round(users.reduce((a,u)=>a+(u.pct||0),0)/users.length) : 0;
  document.getElementById('s-avgpct').textContent = avg+'%';
  const grid = document.getElementById('people-grid');
  if(users.length===0){
    grid.innerHTML='<div class="empty"><h3>아직 등록된 입사자가 없어요</h3><p>+ 입사자 등록 버튼으로 추가해주세요.</p></div>';
    return;
  }
  users.sort((a,b)=>new Date(b.startedAt)-new Date(a.startedAt));
  grid.innerHTML = users.map(u=>{
    const pct = u.pct||0;
    const pctClass = pct===100?'done':pct>50?'mid':'low';
    const barClass = pct===100?'done-bar':pct>50?'mid-bar':'low-bar';
    const day = getDayDiff(u.joindate);
    const lastUpdate = u.lastUpdated ? new Date(u.lastUpdated).toLocaleDateString('ko-KR') : '-';
    const hr = getHRState(u.userId);
    const dotsHTML = MISSIONS.map(m=>{
      const sent = u.missionSent&&u.missionSent[m.id];
      const progress = u.progress||{};
      const taskIds = [];
      for(let i=1;i<=MISSION_TASKS[m.id];i++) taskIds.push(m.id.replace('m','t')+'_'+i);
      const doneCnt = taskIds.filter(tid=>progress[tid]).length;
      const cls = sent?'sent':doneCnt>0?'partial':'';
      return `<div class="mdot ${cls}" title="${m.emoji} ${m.title}"></div>`;
    }).join('');

    const hrItems = [
      {key:'meeting', label:'대표님 회사 소개 미팅 일정 조율 및 캘린더 등록'},
      {key:'device', label:'노트북 및 장비 준비 (사번 발급 포함)'},
      {key:'it_account', label:'사내 계정 생성 (이메일)', inputKey:'email', inputPlaceholder:'생성할 이메일 (예: wbkim@mustit.co.kr)', hasNotify:true},
      {key:'naverworks', label:'네이버웍스 계정 생성 및 서류 발송'},
      {key:'teams_invite', label:'Teams 온보딩 채널 초대'},
      {key:'kyobo', label:'교보문고 전자도서관 계정 발급', inputKey:'kyobo_id', inputPlaceholder:'발급된 아이디 메모'},
      {key:'kakao', label:'카카오T 법인 인증 안내 전달'},
      {key:'link_sent', label:'온보딩 링크 입사자에게 전달 완료'},
    ];

    const hrHTML = hrItems.map(item=>`
      <div class="hr-task">
        <div class="hr-cb ${hr[item.key]?'on':''}" id="hr_${u.userId}_${item.key}" onclick="toggleHR('${u.userId}','${item.key}')">${hr[item.key]?'✓':''}</div>
        <span class="hr-label">${item.label}</span>
        ${item.inputKey ? `<input class="hr-input" id="note_${u.userId}_${item.inputKey}" placeholder="${item.inputPlaceholder}" value="${hr[item.inputKey+'_val']||''}" oninput="saveNote('${u.userId}','${item.inputKey}')"/>` : ''}
        ${item.hasNotify ? `<button class="notify-btn ${hr['notify_sent']?'sent':''}" id="notify_${u.userId}" onclick="notifyIT('${u.userId}')">${hr['notify_sent']?'✓ 전송 완료':'📨 개발팀 요청'}</button>` : ''}
      </div>`).join('');

    return `
      <div class="person-wrap ${pct===100?'complete':''}">
        <div class="person-card" onclick="togglePanel('${u.userId}')">
          <div class="avatar">${u.name.charAt(0)}</div>
          <div class="person-info">
            <div class="person-name">${u.name}</div>
            <div class="person-meta">${u.dept} · 입사 ${new Date(u.joindate).toLocaleDateString('ko-KR')} · 최근 업데이트 ${lastUpdate}</div>
            ${u.meeting?`<div class="person-meta" style="margin-top:2px;">📅 ${new Date(u.meeting).toLocaleDateString('ko-KR')} ${new Date(u.meeting).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}${u.room?' · '+u.room+'호 회의실':''}</div>`:''}
            <div class="mission-dots" style="margin-top:8px">${dotsHTML}</div>
          </div>
          <div class="person-right">
            <div class="person-pct ${pctClass}">${pct}%</div>
            <div class="mini-bar-wrap"><div class="mini-bar ${barClass}" style="width:${pct}%"></div></div>
            <div class="day-badge">D+${day}</div>
            <div class="expand-icon" id="icon_${u.userId}">▼</div>
          </div>
        </div>
        <div class="hr-panel" id="panel_${u.userId}">
          <div class="hr-panel-title">인사담당자 체크리스트</div>
          ${hrHTML}
          ${u.personalInfo ? `
          <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
            <div style="font-size:11px;font-weight:700;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">📋 입사자 제출 정보</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              <div style="background:var(--dark3);border-radius:8px;padding:10px 12px;">
                <div style="font-size:10px;color:var(--gray);margin-bottom:3px;">전화번호</div>
                <div style="font-size:13px;">${u.personalInfo.phone}</div>
              </div>
              <div style="background:var(--dark3);border-radius:8px;padding:10px 12px;">
                <div style="font-size:10px;color:var(--gray);margin-bottom:3px;">개인 이메일</div>
                <div style="font-size:13px;">${u.personalInfo.email}</div>
              </div>
              <div style="background:var(--dark3);border-radius:8px;padding:10px 12px;grid-column:span 2;">
                <div style="font-size:10px;color:var(--gray);margin-bottom:3px;">주소</div>
                <div style="font-size:13px;">${u.personalInfo.address}</div>
              </div>
              <div style="background:var(--dark3);border-radius:8px;padding:10px 12px;grid-column:span 2;">
                <div style="font-size:10px;color:var(--gray);margin-bottom:3px;">급여 계좌번호</div>
                <div style="font-size:13px;">${u.personalInfo.account}</div>
              </div>
            </div>
            <div style="font-size:10px;color:var(--gray);margin-top:6px;">제출 시각: ${new Date(u.personalInfo.submittedAt).toLocaleString('ko-KR')}</div>
          </div>` : '<div style="margin-top:12px;padding:10px;background:rgba(232,25,44,0.08);border-radius:8px;font-size:12px;color:#FF6B7A;text-align:center;">⏳ 아직 개인정보를 입력하지 않았어요</div>'}
          <div class="hr-footer">
            <button class="link-copy-btn" onclick="copyUserLink('${u.userId}')">📋 온보딩 링크 복사</button>
            <button class="del-btn" onclick="deleteUser('${u.userId}')">삭제</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function openModal(){
  document.getElementById('modal-bg').style.display='flex';
  document.getElementById('link-result').style.display='none';
  document.getElementById('m-date').value=new Date().toISOString().split('T')[0];
}
function closeModal(){
  document.getElementById('modal-bg').style.display='none';
  ['m-name','m-meeting'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-dept').value='';
  document.getElementById('m-room').value='';
}
function registerUser(){
  const name=document.getElementById('m-name').value.trim();
  const dept=document.getElementById('m-dept').value;
  const joindate=document.getElementById('m-date').value;
  const meeting=document.getElementById('m-meeting').value;
  const room=document.getElementById('m-room').value;
  if(!name||!dept||!joindate){alert('이름, 부서, 입사일을 입력해주세요!');return;}
  const userId=name+'_'+joindate;
  const userData={name,dept,joindate,userId,meeting,room,startedAt:new Date().toISOString(),pct:0};
  const allUsers=JSON.parse(localStorage.getItem('mustit_users')||'{}');
  allUsers[userId]=userData;
  localStorage.setItem('mustit_users',JSON.stringify(allUsers));
  if(meeting){
    const start=new Date(meeting);
    const end=new Date(start.getTime()+60*60*1000);
    const fmt=d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    const location=room?'패스트파이브 신사1호점 '+room+'호 회의실':'패스트파이브 신사1호점';
    const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//MUSTIT//Onboarding//KO','BEGIN:VEVENT','DTSTART:'+fmt(start),'DTEND:'+fmt(end),'SUMMARY:'+name+'님 온보딩 — 대표님 회사 소개','DESCRIPTION:신규 입사자 '+name+' ('+dept+') 온보딩 미팅','LOCATION:'+location,'STATUS:CONFIRMED','END:VEVENT','END:VCALENDAR'].join('\r\n');
    const blob=new Blob([ics],{type:'text/calendar'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=name+'_대표님미팅.ics';
    a.click();
  }
  const link=window.location.origin+window.location.pathname.replace('dashboard.html','')+'onboarding.html?uid='+encodeURIComponent(userId);
  document.getElementById('link-text').textContent=link;
  document.getElementById('link-result').style.display='block';
  loadDashboard();
}
function copyLink(){
  const link=document.getElementById('link-text').textContent;
  navigator.clipboard.writeText(link).then(()=>{
    alert('링크 복사됐어요! 입사자에게 전달해주세요 😊');
    closeModal();
  });
}

loadDashboard();
setInterval(loadDashboard,30000);
</script>
</body>
</html>
