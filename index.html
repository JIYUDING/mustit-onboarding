<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUST'IT 뉴커머 온보딩</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8192C;
  --red-dark: #A81020;
  --dark: #14141F;
  --dark2: #1E1E2E;
  --dark3: #252535;
  --gray: #8888A0;
  --border: rgba(255,255,255,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--dark);
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  overflow: hidden;
}
.bg-glow {
  position: fixed;
  top: -200px; left: 50%; transform: translateX(-50%);
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(232,25,44,0.15) 0%, transparent 65%);
  pointer-events: none;
}
.card {
  width: 100%;
  max-width: 440px;
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 36px;
  animation: fadeUp 0.6s ease both;
}
.logo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.logo {
  background: var(--red);
  color: white;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 1px;
  padding: 5px 10px;
  border-radius: 6px;
}
.logo-sub { font-size: 13px; color: var(--gray); }
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 40px;
  letter-spacing: 1px;
  line-height: 1.1;
  margin-bottom: 6px;
}
h1 span { color: var(--red); }
.sub {
  font-size: 13px;
  color: var(--gray);
  margin-bottom: 32px;
  line-height: 1.6;
}
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 12px;
  color: var(--gray);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}
.field input, .field select {
  width: 100%;
  padding: 12px 14px;
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: white;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus { border-color: rgba(232,25,44,0.5); }
.field select option { background: var(--dark2); }
.start-btn {
  width: 100%;
  padding: 14px;
  background: var(--red);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.start-btn:hover { background: var(--red-dark); transform: translateY(-1px); }
.dashboard-link {
  display: block;
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: var(--gray);
  text-decoration: none;
  transition: color 0.2s;
}
.dashboard-link:hover { color: white; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo-row">
    <div class="logo">MUST'IT</div>
    <div class="logo-sub">People Team</div>
  </div>
  <h1>WELCOME<br><span>ON BOARD</span></h1>
  <p class="sub">개인의 성장이 곧 회사의 성장입니다.<br>정보를 입력하고 온보딩을 시작하세요.</p>

  <div class="field">
    <label>이름 *</label>
    <input type="text" id="name" placeholder="홍길동" />
  </div>
  <div class="field">
    <label>부서 *</label>
    <select id="dept">
      <option value="">부서 선택</option>
      <optgroup label="Platform">
        <option>Back-end</option>
        <option>Front-end</option>
        <option>Product Management</option>
        <option>Customer eXperience</option>
      </optgroup>
      <optgroup label="Business · Growth Unit">
        <option>Growth Planning</option>
        <option>Growth Marketing</option>
        <option>Design</option>
      </optgroup>
      <optgroup label="Business · Commerce Unit">
        <option>Online MD</option>
        <option>AD</option>
      </optgroup>
      <optgroup label="Corporate">
        <option>Finance</option>
        <option>People</option>
      </optgroup>
      <optgroup label="Expansion">
        <option>Market Expansion</option>
      </optgroup>
    </select>
  </div>
  <div class="field">
    <label>입사일 *</label>
    <input type="date" id="joindate" />
  </div>

  <button class="start-btn" onclick="startOnboarding()">온보딩 시작하기 →</button>
  <a href="dashboard.html" class="dashboard-link">인사담당자 대시보드 →</a>
</div>

<script>
// 오늘 날짜 기본값
document.getElementById('joindate').value = new Date().toISOString().split('T')[0];

function startOnboarding() {
  const name = document.getElementById('name').value.trim();
  const dept = document.getElementById('dept').value;
  const joindate = document.getElementById('joindate').value;
  if (!name || !dept || !joindate) {
    alert('모든 항목을 입력해주세요!');
    return;
  }
  const userId = name + '_' + joindate;
  const userData = { name, dept, joindate, userId, startedAt: new Date().toISOString() };

  // 전체 사용자 목록 저장
  const allUsers = JSON.parse(localStorage.getItem('mustit_users') || '{}');
  if (!allUsers[userId]) allUsers[userId] = userData;
  localStorage.setItem('mustit_users', JSON.stringify(allUsers));

  // 현재 세션 저장
  localStorage.setItem('mustit_current', JSON.stringify(userData));
  window.location.href = 'onboarding.html';
}
</script>
</body>
</html>
