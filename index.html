<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUST'IT 뉴커머 온보딩</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#14141F;color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(232,25,44,0.15) 0%,transparent 65%);pointer-events:none;}
.card{width:100%;max-width:420px;background:#1E1E2E;border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:40px 36px;text-align:center;animation:fadeUp 0.6s ease both;}
.logo{display:inline-block;background:#E8192C;color:white;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;padding:5px 10px;border-radius:6px;margin-bottom:24px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:1px;line-height:1.1;margin-bottom:12px;}
h1 span{color:#E8192C;}
p{font-size:14px;color:#8888A0;line-height:1.7;margin-bottom:32px;}
.icon{font-size:48px;margin-bottom:16px;}
.sub{font-size:12px;color:#8888A0;margin-top:24px;}
.sub a{color:rgba(255,255,255,0.3);text-decoration:none;font-size:11px;}
.sub a:hover{color:rgba(255,255,255,0.5);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo">MUST'IT</div>
  <div class="icon">📬</div>
  <h1>WELCOME<br><span>ON BOARD</span></h1>
  <p>인사담당자로부터 받은 온보딩 링크로 접속해주세요.<br>링크가 없다면 People Team에 문의하세요.</p>
  <div class="sub"><a href="dashboard.html">인사담당자이신가요? →</a></div>
</div>
<script>
// URL 파라미터 있으면 바로 온보딩으로
const uid = new URLSearchParams(window.location.search).get('uid');
if(uid) window.location.href = 'onboarding.html?uid=' + encodeURIComponent(uid);

// 이전에 진행한 적 있으면 바로 온보딩으로
const existing = localStorage.getItem('mustit_current');
if(existing) window.location.href = 'onboarding.html';
</script>
</body>
</html>
