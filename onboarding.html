.hero { padding: 40px 24px 32px; text-align: center; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 500px; height: 500px; background: radial-gradient(circle, rgba(232,25,44,0.15) 0%, transparent 70%); pointer-events: none; }
.hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(44px, 8vw, 72px); letter-spacing: 2px; line-height: 1; }
.hero h1 span { color: var(--red); }
.hero-sub { font-size: 14px; color: var(--gray); margin-top: 10px; }

.progress-section { max-width: 720px; margin: 0 auto; padding: 0 24px 32px; }
.progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
.progress-label { font-size: 12px; color: var(--gray); }
.progress-pct { font-size: 12px; font-weight: 700; color: var(--red); }
.progress-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
.progress-fill { height: 4px; background: var(--red); border-radius: 999px; transition: width .5s cubic-bezier(.4,0,.2,1); }
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 14px; }
.stat-box { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.stat-n { font-size: 20px; font-weight: 700; }
.stat-l { font-size: 10px; color: var(--gray); margin-top: 2px; letter-spacing: 0.5px; }

.missions { max-width: 720px; margin: 0 auto; padding: 0 24px 40px; display: flex; flex-direction: column; gap: 10px; }

.mission-badge.done { background: var(--success); color: white; border-color: var(--success); }

.mission-title { font-size: 13px; font-weight: 700; }
.mission-sub { font-size: 11px; color: var(--gray); margin-top: 2px; }

.mission-prog { font-size: 11px; color: var(--gray); }

.chevron.open { transform: rotate(180deg); }
.mission-body { display: none; border-top: 1px solid var(--border); }
.mission-body.open { display: block; }

.task { display: flex; align-items: flex-start; gap: 10px; padding: 12px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
.task:last-of-type { border-bottom: none; }
.task:hover { background: rgba(255,255,255,0.03); }

.task-cb { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid rgba(255,255,255,0.2); flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all .2s; font-size: 9px; font-weight: 900; }

footer { text-align: center; padding: 24px; font-size: 11px; color: rgba(255,255,255,0.15); border-top: 1px solid var(--border); }

      {id:'t8_2', title:'Claude 기본 사용법 익히기', desc:'프롬프트 작성법, 파일 업로드, 대화 이어가기 등 기본 기능 체험', req:true},
      {id:'t8_3', title:'업무 활용 예시 따라하기', desc:'문서 요약 / 이메일 초안 / 데이터 분석 / 브레인스토밍 중 1개 이상 직접 해보기', req:true},
      {id:'t8_4', title:'머스트잇 AI 활용 가이드 확인', desc:'Wiki → AI 활용 가이드에서 사내 AI 사용 정책 및 주의사항 확인', req:true, link:'https://wiki.mustit.xyz'},
    ]
  }
];

// 유저 정보 로드
const currentUser = JSON.parse(localStorage.getItem('mustit_current') || 'null');
if (!currentUser) { window.location.href = 'index.html'; }

const { name, dept, joindate, userId } = currentUser;

// D+N 계산
const joinDt = new Date(joindate);
const today = new Date();
const diffDays = Math.floor((today - joinDt) / (1000*60*60*24)) + 1;

document.getElementById('tb-name').textContent = name + '님';
document.getElementById('tb-dept').textContent = dept;
document.getElementById('tb-day').textContent = 'D+' + diffDays;
document.getElementById('hero-sub').textContent = name + '님, 함께해서 반가워요! 아래 미션을 순서대로 완료해주세요.';

// 저장된 체크 상태 로드
const storageKey = 'mustit_progress_' + userId;
const savedProgress = JSON.parse(localStorage.getItem(storageKey) || '{}');
const taskState = {};
const missionSent = JSON.parse(localStorage.getItem(storageKey + '_sent') || '{}');
MISSIONS.forEach(m => m.tasks.forEach(t => { taskState[t.id] = savedProgress[t.id] || false; }));

function saveProgress() {
  localStorage.setItem(storageKey, JSON.stringify(taskState));
  localStorage.setItem(storageKey + '_sent', JSON.stringify(missionSent));
  // 전체 사용자 진행도 업데이트
  const allUsers = JSON.parse(localStorage.getItem('mustit_users') || '{}');
  if (allUsers[userId]) {
    allUsers[userId].progress = taskState;
    allUsers[userId].missionSent = missionSent;
    allUsers[userId].lastUpdated = new Date().toISOString();
    allUsers[userId].pct = Math.round(Object.values(taskState).filter(Boolean).length / MISSIONS.reduce((a,m)=>a+m.tasks.length,0)*100);
    localStorage.setItem('mustit_users', JSON.stringify(allUsers));
  }
}

function totalTasks() { return MISSIONS.reduce((a,m) => a+m.tasks.length, 0); }
function doneTasks() { return Object.values(taskState).filter(Boolean).length; }
function doneMissions() { return MISSIONS.filter(m => m.tasks.every(t => taskState[t.id])).length; }
function getMissionDone(mid) { return MISSIONS.find(x=>x.id===mid).tasks.every(t=>taskState[t.id]); }
function getMissionProgress(mid) { const m=MISSIONS.find(x=>x.id===mid); return m.tasks.filter(t=>taskState[t.id]).length+'/'+m.tasks.length; }

function updateProgress() {
  const tt=totalTasks(), dt=doneTasks(), dm=doneMissions();
  const pct=Math.round(dt/tt*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-label').textContent=dm+'개 미션 완료';
  document.getElementById('st-missions').textContent=dm+'/8';
  document.getElementById('st-tasks').textContent=dt;
  document.getElementById('st-pct').textContent=pct+'%';
  if(dm===8) document.getElementById('complete-banner').style.display='block';
}

function updateCard(mid) {
  const m=MISSIONS.find(x=>x.id===mid);
  const allDone=getMissionDone(mid);
  const badge=document.getElementById('badge-'+mid);
  const prog=document.getElementById('prog-'+mid);
  const btn=document.getElementById('btn-'+mid);
  const card=document.getElementById('card-'+mid);
  prog.textContent=getMissionProgress(mid);
  if(missionSent[mid]){
    badge.className='mission-badge done'; badge.textContent='✓';
    card.classList.add('completed');
    btn.className='teams-btn sent'; btn.textContent='✓ Teams 알림 전송 완료';
  } else if(allDone){
    badge.className='mission-badge active'; badge.textContent=m.num;
    btn.className='teams-btn ready'; btn.textContent='📨 Teams로 완료 알림 전송하기';
  } else {
    badge.className='mission-badge'; badge.textContent=m.num;
    btn.className='teams-btn locked'; btn.textContent='모든 항목 체크 후 완료 가능';
  }
}

function toggleTask(tid, mid) {
  taskState[tid]=!taskState[tid];
  const cb=document.getElementById('cb-'+tid);
  const item=document.getElementById('task-'+tid);
  if(taskState[tid]){ cb.classList.add('on'); cb.textContent='✓'; item.classList.add('done'); }
  else { cb.classList.remove('on'); cb.textContent=''; item.classList.remove('done'); }
  updateCard(mid); updateProgress(); saveProgress();
}

function toggleMission(mid) {
  const body=document.getElementById('body-'+mid);
  const chev=document.getElementById('chev-'+mid);
  const isOpen=body.classList.contains('open');
  document.querySelectorAll('.mission-body').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.chevron').forEach(c=>c.classList.remove('open'));
  if(!isOpen){ body.classList.add('open'); chev.classList.add('open'); }
}

function sendTeams(mid) {
  if(missionSent[mid]||!getMissionDone(mid)) return;
  missionSent[mid]=true;
  updateCard(mid); updateProgress(); saveProgress();
  const m=MISSIONS.find(x=>x.id===mid);
  const now=new Date();
  const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const allDone=doneMissions()===8;
  const list=document.getElementById('log-list');
  const div=document.createElement('div');
  div.className='log-item '+(allDone?'success':'new');
  div.innerHTML=(allDone?'🎉 <strong>'+name+'님 전체 온보딩 완료!</strong>':'📋 <strong>'+name+'님 Mission '+m.num+' 완료</strong> — '+m.title)+'<div class="log-time">'+t+'</div>';
  list.insertBefore(div, list.firstChild);
  fetch(WEBHOOK_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      type:'message',
      attachments:[{
        contentType:'application/vnd.microsoft.card.adaptive',
        content:{
          type:'AdaptiveCard', version:'1.2',
          body:[
            {type:'TextBlock', text:(allDone?'🎉 전체 온보딩 완료!':'📋 Mission '+m.num+' 완료'), weight:'Bolder', size:'Medium'},
            {type:'TextBlock', text:'👤 '+name+' ('+dept+')', wrap:true},
            {type:'TextBlock', text:'📌 '+m.title, wrap:true},
            {type:'TextBlock', text:'🕐 '+now.toLocaleString('ko-KR'), isSubtle:true, size:'Small'}
          ]
        }
      }]
    })
  }).catch(()=>{});
}

function render() {
  const wrap=document.getElementById('missions-wrap');
  MISSIONS.forEach((m,i)=>{
    const card=document.createElement('div');
    card.className='mission-card'; card.id='card-'+m.id;
    card.style.animationDelay=(i*0.05)+'s';
    const tasksHTML=m.tasks.map(t=>`
      <div class="task${taskState[t.id]?' done':''}" id="task-${t.id}" onclick="toggleTask('${t.id}','${m.id}')">
        <div class="task-cb${taskState[t.id]?' on':''}" id="cb-${t.id}">${taskState[t.id]?'✓':''}</div>
        <div class="task-content">
          <div class="task-title">${t.title}</div>
          <div class="task-desc">${t.desc}</div>
          ${t.link?`<a class="task-link" href="${t.link}" target="_blank" onclick="event.stopPropagation()">↗ ${t.link.replace('https://','').split('/')[0]}</a>`:''}
        </div>
        <span class="task-tag ${t.req?'tag-req':'tag-opt'}">${t.req?'필수':'참고'}</span>
      </div>`).join('');
    card.innerHTML=`
      <div class="mission-header" onclick="toggleMission('${m.id}')">
        <div class="mission-badge" id="badge-${m.id}">${m.num}</div>
        <div class="mission-info">
          <div class="mission-title">${m.emoji} ${m.title}</div>
          <div class="mission-sub">${m.sub}</div>
        </div>
        <div class="mission-meta">
          <span class="mission-prog" id="prog-${m.id}">${getMissionProgress(m.id)}</span>
          <div class="chevron" id="chev-${m.id}">▼</div>
        </div>
      </div>
      <div class="mission-body" id="body-${m.id}">
        ${tasksHTML}
        <div class="mission-action">
          <button class="teams-btn locked" id="btn-${m.id}" onclick="sendTeams('${m.id}')">모든 항목 체크 후 완료 가능</button>
        </div>
      </div>`;
    wrap.appendChild(card);
    updateCard(m.id);
  });
  document.getElementById('body-m1').classList.add('open');
  document.getElementById('chev-m1').classList.add('open');
  updateProgress();
}
render();
</script>
</body>
</html>
